# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL DataSource ──────────────────────────────────────────────────────────
# Change the credentials and DB name to match your local MySQL setup.
spring.datasource.url=jdbc:mysql://localhost:3306/carpooling_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# update   → applies schema changes without dropping data (good for dev)
# validate → only verifies schema matches entities  (good for prod)
# create   → drops & recreates tables on every start (use only for first run)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Jackson ──────────────────────────────────────────────────────────────────
# Serialize LocalDateTime as ISO-8601 strings instead of timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
